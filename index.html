<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز عمليات إلياس</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; margin: 0; padding: 10px; }
        .header { background: #161b22; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #30363d; margin-bottom: 10px; }
        .alert { color: #238636; font-weight: bold; font-size: 1.1rem; border: 1px dashed #238636; padding: 10px; border-radius: 8px; margin-top: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 10px; }
        .card { background: #161b22; padding: 15px; border-radius: 10px; border: 1px solid #30363d; }
        textarea { width: 100%; height: 100px; background: #0d1117; color: white; border: 1px solid #30363d; border-radius: 5px; padding: 10px; box-sizing: border-box; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0;">📊 منصة المتابعة الحية</h2>
        <div id="clock" style="color: #8b949e;"></div>
        <div class="alert">🎯 منطقة دعم S&P 500 المرتقبة: 6530 - 6600</div>
    </div>

    <div class="grid">
        <div class="card">
            <h3 style="margin-top:0; color: #238636;">أسهمي المفضلة</h3>
            <div class="tradingview-widget-container">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
                { "colorTheme": "dark", "showChart": false, "locale": "ar_SA", "width": "100%", "height": "350",
                  "tabs": [{ "title": "القائمة", "symbols": [{"s": "TASI:1120","d":"الراجحي"},{"s": "TASI:2222","d":"أرامكو"},{"s": "AMEX:SPY","d":"S&P 500"}] }] }
                </script>
            </div>
            <h3 style="color: #238636;">مفكرة التداول</h3>
            <textarea id="noteBox" placeholder="اكتب أهدافك أو صفقاتك هنا..."></textarea>
        </div>

        <div class="card" style="height: 550px;">
            <div id="chart_div" style="height: 100%;"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
            <script type="text/javascript">
                new TradingView.widget({ "autosize": true, "symbol": "AMEX:SPY", "interval": "D", "timezone": "Asia/Riyadh", "theme": "dark", "style": "1", "locale": "ar_SA", "container_id": "chart_div" });
            </script>
        </div>
    </div>

    <script>
        function updateTime() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('ar-SA'); }
        setInterval(updateTime, 1000); updateTime();
        
        const box = document.getElementById('noteBox');
        box.value = localStorage.getItem('my_invest_notes') || '';
        box.oninput = () => localStorage.setItem('my_invest_notes', box.value);
    </script>
</body>
</html>
