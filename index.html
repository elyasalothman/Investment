<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة استثمارات إلياس العثمان</title>
    <style>
        :root {
            --bg-dark: #131722;
            --card-bg: #1e222d;
            --accent: #27ae60;
            --text-main: #d1d4dc;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
        }

        /* شاشة الحماية */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10000;
        }
        .lock-card {
            background: var(--card-bg); padding: 40px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;
            border-top: 4px solid var(--accent);
        }
        input[type="password"] {
            padding: 12px; border-radius: 5px; border: 1px solid var(--accent);
            background: #2a2e39; color: white; width: 200px; text-align: center; font-size: 1.1rem;
        }
        .btn-enter {
            margin-top: 15px; padding: 10px 30px; background: var(--accent);
            color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;
        }

        /* المحتوى الرئيسي */
        #dashboard { display: none; padding: 20px; }
        
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; border-bottom: 1px solid #2a2e39; margin-bottom: 20px;
        }
        #clock { font-size: 1.2rem; font-weight: bold; color: var(--accent); }

        .alert-zone {
            background: rgba(39, 174, 96, 0.1); border: 1px dashed var(--accent);
            padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center;
        }

        .grid {
            display: grid; grid-template-columns: 1fr 3fr; gap: 20px;
        }
        .card { background: var(--card-bg); border-radius: 10px; padding: 15px; overflow: hidden; }

        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="lock-card">
            <h2 style="color: var(--accent); margin-bottom: 20px;">المكتب الاستثماري الخاص</h2>
            <input type="password" id="passInput" placeholder="كلمة المرور">
            <br>
            <button class="btn-enter" onclick="unlock()">دخول الآمن</button>
            <p id="errMsg" style="color: #e74c3c; display: none; margin-top: 10px;">كلمة المرور غير صحيحة</p>
        </div>
    </div>

    <div id="dashboard">
        <div class="top-bar">
            <h2>لوحة متابعة إلياس</h2>
            <div id="clock">00:00:00</div>
        </div>

        <div class="alert-zone">
            <strong>مراقبة S&P 500:</strong> نحن نترقب منطقة الدعم بين <span style="color: white; font-weight: bold;">6530 - 6600</span>
        </div>

        <div style="margin-bottom: 20px;">
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
                {
                    "symbols": [
                        {"proName": "TASI:TASI", "title": "TASI (تاسي)"},
                        {"proName": "CURRENCYCOM:SP500", "title": "S&P 500"},
                        {"proName": "TASI:1120", "title": "الراجحي"},
                        {"proName": "TASI:2222", "title": "أرامكو"},
                        {"proName": "NASDAQ:TSLA", "title": "تسلا"}
                    ],
                    "colorTheme": "dark", "locale": "ar_SA"
                }
                </script>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <h3 style="margin-top: 0;">قائمة المراقبة</h3>
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
                    {
                        "colorTheme": "dark", "showChart": false, "locale": "ar_SA", "width": "100%", "height": "450",
                        "tabs": [{"title": "الأسهم المختارة", "symbols": [
                            {"s": "TASI:1120"}, {"s": "TASI:2222"}, {"s": "NASDAQ:AAPL"}, {"s": "NASDAQ:MSFT"}, {"s": "AMEX:SPY"}
                        ]}]
                    }
                    </script>
                </div>
            </div>

            <div class="card" style="height: 550px;">
                <div id="tv_chart" style="height: 100%;"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                <script type="text/javascript">
                    new TradingView.widget({
                        "autosize": true, "symbol": "AMEX:SPY", "interval": "D",
                        "timezone": "Asia/Riyadh", "theme": "dark", "style": "1",
                        "locale": "ar_SA", "container_id": "tv_chart", "hide_side_toolbar": false
                    });
                </script>
            </div>
        </div>
    </div>

    <script>
        // ساعة مباشرة
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('ar-SA');
        }
        setInterval(updateTime, 1000);
        updateTime();

        // نظام الحماية
        function unlock() {
            const pass = document.getElementById('passInput').value;
            // يمكنك تغيير كلمة المرور هنا
            if (pass === '2026') {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else {
                document.getElementById('errMsg').style.display = 'block';
            }
        }
        
        // السماح بالدخول عند ضغط زر Enter
        document.getElementById('passInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') unlock();
        });
    </script>
</body>
</html>
