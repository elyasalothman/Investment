<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Executive Trading Desk — منصة التداول التنفيذية</title>
<link rel="dns-prefetch" href="https://s3.tradingview.com"/>
<link rel="preconnect" href="https://s3.tradingview.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════════════
   TOKENS — DARK (DEFAULT)
══════════════════════════════════════════ */
:root {
  --gold:#C9A84C; --gold-l:#E8C87A; --gold-d:#7A6230; --gold-glow:rgba(201,168,76,.18);
  --bg:#07070A; --bg2:#0D0D14; --bg3:#13131C; --bg4:#1A1A26;
  --surface:rgba(22,22,34,.95); --surface2:#1E1E2C; --surface3:#252535;
  --border:rgba(255,255,255,.07); --border2:rgba(255,255,255,.13); --border-gold:rgba(201,168,76,.22);
  --text:#DDE4EF; --text2:#8E98AA; --text3:#545468;
  --green:#089981; --green-s:rgba(8,153,129,.14);
  --red:#F23645; --red-s:rgba(242,54,69,.12);
  --blue:#2962FF; --blue-s:rgba(41,98,255,.14);
  --amber:#FFB020; --amber-s:rgba(255,176,32,.12);
  --shadow:0 14px 36px rgba(0,0,0,.36);
  --radius:16px; --radius-sm:10px;
  --font:'IBM Plex Sans Arabic',sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
body.light {
  --bg:#EEF2F8; --bg2:#E6EDF6; --bg3:#DDE6F2; --bg4:#D4DEEE;
  --surface:rgba(255,255,255,.96); --surface2:#F4F8FF; --surface3:#EBF2FF;
  --border:rgba(17,24,39,.07); --border2:rgba(17,24,39,.14); --border-gold:rgba(140,100,20,.22);
  --text:#111827; --text2:#6B7280; --text3:#9CA3AF;
  --green:#0F9D7A; --green-s:rgba(15,157,122,.1);
  --red:#D92D20; --red-s:rgba(217,45,32,.1);
  --blue:#2457E6; --blue-s:rgba(36,87,230,.1);
  --amber:#D97706; --amber-s:rgba(217,119,6,.1);
  --shadow:0 14px 34px rgba(15,23,42,.08);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{min-height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;transition:background .3s,color .3s}
button,input,select,textarea{font-family:inherit;color:var(--text)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── AUTH ── */
.auth-wrap{min-height:100vh;display:grid;place-items:center;padding:20px;
  background:radial-gradient(circle at 60% 40%,rgba(201,168,76,.12),transparent 40%),radial-gradient(circle at 20% 80%,rgba(8,153,129,.08),transparent 30%),var(--bg)}
.auth-card{width:min(92%,560px);background:var(--surface);border:1px solid var(--border-gold);border-radius:24px;
  box-shadow:var(--shadow),0 0 60px rgba(201,168,76,.08);padding:40px 32px;text-align:center;backdrop-filter:blur(20px)}
.auth-mark{width:56px;height:56px;border:2px solid var(--gold);transform:rotate(45deg);display:inline-flex;align-items:center;
  justify-content:center;margin-bottom:24px}
.auth-mark span{transform:rotate(-45deg);font-size:22px;color:var(--gold);font-weight:600}
.auth-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:999px;
  border:1px solid var(--border-gold);background:var(--gold-glow);color:var(--gold);font-size:.88rem;margin-bottom:16px}
.auth-title{font-size:clamp(1.6rem,3vw,2.4rem);font-weight:600;margin-bottom:8px;letter-spacing:.02em}
.auth-sub{color:var(--text2);line-height:1.9;margin-bottom:28px;font-size:.92rem}
.btn-enter{background:linear-gradient(135deg,var(--gold),var(--gold-l));color:#07070A;border:none;
  padding:14px 40px;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:.04em;
  box-shadow:0 8px 24px rgba(201,168,76,.3);transition:.2s}
.btn-enter:hover{filter:brightness(1.08);transform:translateY(-1px)}

/* ── TICKER ── */
.ticker-bar{background:var(--bg2);border-bottom:1px solid var(--border-gold);height:38px;overflow:hidden;flex-shrink:0}
.ticker-track{display:flex;align-items:center;height:100%;white-space:nowrap;animation:ticker 32s linear infinite;width:max-content}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.t-item{display:inline-flex;align-items:center;gap:8px;padding:0 22px;font-size:12px;font-family:var(--mono)}
.t-sym{color:var(--gold);font-weight:500}
.t-px{color:var(--text)}
.up{color:var(--green)}.dn{color:var(--red)}

/* ── HEADER ── */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);height:54px;padding:0 20px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.brand{display:flex;align-items:center;gap:12px}
.brand-mark{width:30px;height:30px;border:1.5px solid var(--gold);transform:rotate(45deg);
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-mark span{transform:rotate(-45deg);font-size:13px;color:var(--gold);font-weight:700}
.brand-txt{font-size:15px;font-weight:600;letter-spacing:.03em}
.brand-sub{font-size:10px;color:var(--text3);letter-spacing:.1em;margin-top:1px}
.hbar-right{display:flex;align-items:center;gap:12px}
.hbadge{font-size:11px;color:var(--text2);background:var(--bg3);border:1px solid var(--border);
  padding:4px 10px;border-radius:4px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s ease infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.hclock{font-family:var(--mono);font-size:12px;color:var(--gold)}
.theme-btn{background:var(--surface2);border:1px solid var(--border);width:34px;height:34px;
  border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:.2s}
.theme-btn:hover{border-color:var(--border-gold)}

/* ── APP SHELL ── */
.shell{display:flex;flex-direction:column;height:100vh}
.workspace{display:grid;grid-template-columns:260px 1fr 300px;flex:1;overflow:hidden;min-height:0}

/* ── PANELS ── */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}
.ph{padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg2);
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.ph-title{font-size:13px;font-weight:600}
.ph-sub{font-size:11px;color:var(--text3);margin-top:2px}
.pb{padding:14px 16px;overflow-y:auto;flex:1;min-height:0}
.ptitle{font-size:10px;color:var(--gold);letter-spacing:.12em;font-weight:500;
  padding:12px 16px 8px;border-bottom:1px solid var(--border);text-transform:uppercase;flex-shrink:0}

/* ── LEFT SIDEBAR ── */
.left-col{background:var(--bg2);border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.sym-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px}
.sym-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:8px 10px;cursor:pointer;text-align:right;transition:.15s}
.sym-btn:hover{border-color:var(--border-gold)}
.sym-btn.active{background:var(--gold-glow);border-color:var(--border-gold)}
.sym-btn b{display:block;font-size:12px;font-weight:600;color:var(--gold)}
.sym-btn small{font-size:10px;color:var(--text3)}
.w-item{padding:9px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;
  align-items:center;cursor:pointer;transition:background .12s}
.w-item:hover{background:var(--bg3)}
.w-item.sel{background:var(--bg3);border-right:2px solid var(--gold)}
.wi-sym{font-size:12px;font-weight:600}
.wi-name{font-size:10px;color:var(--text3);margin-top:1px}
.wi-px{font-family:var(--mono);font-size:12px;font-weight:500;text-align:left}
.wi-chg{font-family:var(--mono);font-size:10px;text-align:left}
.news-item{padding:9px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.news-item:hover{background:var(--bg3)}
.news-time{font-size:10px;color:var(--gold);font-family:var(--mono);margin-bottom:3px}
.news-hl{font-size:11px;line-height:1.5}
.ntag{display:inline-block;font-size:9px;padding:2px 6px;border-radius:2px;margin-top:3px;letter-spacing:.05em}
.nt-bull{background:var(--green-s);color:var(--green)}
.nt-bear{background:var(--red-s);color:var(--red)}
.nt-neu{background:rgba(142,152,170,.1);color:var(--text2)}

/* ── CENTER ── */
.center-col{overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:12px;background:var(--bg)}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:12px 14px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;right:0;width:3px;height:100%}
.kpi.k-gold::before{background:var(--gold)}
.kpi.k-green::before{background:var(--green)}
.kpi.k-red::before{background:var(--red)}
.kpi.k-blue::before{background:var(--blue)}
.kpi-lbl{font-size:10px;color:var(--text3);letter-spacing:.07em;margin-bottom:5px}
.kpi-val{font-family:var(--mono);font-size:20px;font-weight:500}
.kpi-sub{font-size:11px;margin-top:3px;color:var(--text2)}
.kpi-val.gold{color:var(--gold);text-shadow:0 0 16px rgba(201,168,76,.3)}
.kpi-val.green{color:var(--green)}.kpi-val.red{color:var(--red)}

/* ── TABS ── */
.tab-bar{display:flex;gap:4px;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.tab{padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid transparent;
  color:var(--text2);transition:.15s;background:transparent}
.tab:hover{background:var(--bg3)}
.tab.on{background:var(--gold-glow);border-color:var(--border-gold);color:var(--gold)}
.tab-pane{display:none;flex:1;overflow-y:auto;min-height:0}.tab-pane.on{display:flex;flex-direction:column}

/* ── TV CHART ── */
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.chart-top{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg2);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.chart-ttl{font-size:13px;font-weight:600}
.ival-row{display:flex;gap:4px}
.ivbtn{font-size:11px;padding:4px 10px;border-radius:4px;cursor:pointer;border:1px solid var(--border);
  background:transparent;color:var(--text2);transition:.15s}
.ivbtn:hover{background:var(--bg3)}
.ivbtn.on{background:var(--gold-glow);border-color:var(--border-gold);color:var(--gold)}
#tvChartHost{height:420px;width:100%}
#tvChartHost iframe{border:none;width:100%;height:100%}

/* ── JOURNAL ── */
.jform{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.fld{display:flex;flex-direction:column;gap:5px}
.fld label{font-size:11px;color:var(--text2)}
.fld input,.fld select,.fld textarea{background:var(--bg3);border:1px solid var(--border);
  color:var(--text);padding:9px 11px;border-radius:8px;font-size:13px;outline:none;transition:.15s;width:100%}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--border-gold);box-shadow:0 0 0 3px var(--gold-glow)}
.fld textarea{resize:vertical;min-height:70px}
.fld.full{grid-column:1/-1}
.jactions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.btn{padding:9px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);transition:.15s}
.btn:hover{transform:translateY(-1px)}
.btn-prime{background:linear-gradient(135deg,var(--gold),var(--gold-l));color:#07070A;border:none}
.btn-ghost{background:var(--surface2);color:var(--text)}
.btn-danger{background:var(--red-s);color:var(--red);border-color:rgba(242,54,69,.2)}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.filter-row input,.filter-row select{background:var(--bg3);border:1px solid var(--border);
  color:var(--text);padding:7px 10px;border-radius:6px;font-size:12px;outline:none;flex:1;min-width:120px}
.filter-row input:focus,.filter-row select:focus{border-color:var(--border-gold)}
.tbl-wrap{overflow:auto;border:1px solid var(--border);border-radius:10px}
.tbl{width:100%;border-collapse:collapse;min-width:780px}
.tbl th{font-size:10px;color:var(--text3);letter-spacing:.08em;padding:9px 11px;text-align:right;
  border-bottom:1px solid var(--border);background:var(--bg2);font-weight:500;position:sticky;top:0}
.tbl td{padding:9px 11px;border-bottom:1px solid var(--border);font-size:12px}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.02)}
.tag{display:inline-flex;align-items:center;justify-content:center;min-width:56px;
  padding:3px 8px;border-radius:999px;font-size:10px;font-weight:700;border:1px solid transparent}
.tag.long{background:var(--green-s);color:var(--green);border-color:rgba(8,153,129,.2)}
.tag.short{background:var(--red-s);color:var(--red);border-color:rgba(242,54,69,.2)}
.sym-cell{font-family:var(--mono);font-weight:600;color:var(--gold)}
.num{font-family:var(--mono);font-size:12px}
.pos{color:var(--green);font-weight:700}.neg{color:var(--red);font-weight:700}
.del-btn{padding:5px 10px;border-radius:6px;font-size:11px;border:1px solid rgba(242,54,69,.2);
  background:var(--red-s);color:var(--red);cursor:pointer;transition:.15s}
.del-btn:hover{filter:brightness(1.1)}
.empty-state{text-align:center;color:var(--text3);padding:24px;font-size:13px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.stat-lbl{font-size:10px;color:var(--text3);margin-bottom:4px}
.stat-val{font-size:16px;font-weight:700;font-family:var(--mono)}
.monthly-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.mo-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px}
.mo-card h4{font-size:12px;margin-bottom:6px;color:var(--gold)}
.mo-card p{font-size:11px;color:var(--text2);line-height:1.7}
.chart-canvas-wrap{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px}
.chart-canvas-wrap canvas{max-height:240px}

/* ── RISK CALC ── */
.risk-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.risk-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.metric{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px}
.metric-lbl{font-size:10px;color:var(--text3);margin-bottom:5px}
.metric-val{font-size:18px;font-weight:700;font-family:var(--mono)}
.metric-val.gold{color:var(--gold)}.metric-val.green{color:var(--green)}.metric-val.red{color:var(--red)}
.hint{font-size:11px;color:var(--text2);line-height:1.8;margin-top:8px;padding:10px;
  background:var(--surface2);border:1px dashed var(--border);border-radius:8px}
.pct-btns{display:flex;gap:6px;margin-bottom:10px}
.pct-btn{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;border:1px solid var(--border);
  background:var(--surface2);color:var(--text2);cursor:pointer;transition:.15s}
.pct-btn:hover{border-color:var(--border-gold);color:var(--gold)}

/* ── MARKET PULSE ── */
.pulse-gauge{background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  text-align:center;padding:16px;margin-bottom:10px}
.gauge-num{font-size:48px;font-weight:700;line-height:1;font-family:var(--mono)}
.gauge-lbl{font-size:11px;color:var(--text2);margin-top:4px;letter-spacing:.06em}
.pulse-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.pc{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px}
.pc-lbl{font-size:10px;color:var(--text3);margin-bottom:4px}
.pc-val{font-size:14px;font-weight:700}
.chip-group{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.chip{padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600;
  background:var(--green-s);color:var(--green);border:1px solid rgba(8,153,129,.2)}
.pulse-note{font-size:11px;color:var(--text2);line-height:1.7;padding:10px;
  background:rgba(41,98,255,.06);border-right:3px solid var(--blue);border-radius:0 8px 8px 0;margin-top:8px}
.pulse-note strong{color:var(--blue);display:block;margin-bottom:3px}
.hist-stat{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;text-align:center}
.hist-pct{font-size:40px;font-weight:700;color:var(--green);font-family:var(--mono)}
.hist-lbl{font-size:11px;color:var(--text2);margin-top:3px}
.detail-list{margin-top:8px;display:flex;flex-direction:column;gap:6px}
.dl-row{display:flex;justify-content:space-between;font-size:11px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.dl-k{color:var(--text2)}.dl-v{font-weight:600}

/* ── RIGHT COL ── */
.right-col{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.rmeter{padding:14px 14px 4px}
.r-lbl{font-size:11px;color:var(--text2);margin-bottom:5px;display:flex;justify-content:space-between}
.r-bar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:12px}
.r-fill{height:100%;border-radius:3px}
.pnl-row{padding:8px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.pnl-sym{font-size:12px;font-weight:600}
.pnl-note{font-size:10px;color:var(--text3);margin-top:1px}
.pnl-val{font-family:var(--mono);font-size:12px;font-weight:600}
.cal-wrap{height:320px}
#tvCalHost{height:100%}

/* ── ORDER FORM ── */
.order-form{padding:14px;border-top:1px solid var(--border-gold);background:var(--bg3);flex-shrink:0}
.of-ttl{font-size:10px;color:var(--gold);letter-spacing:.12em;margin-bottom:10px;text-transform:uppercase}
.of-seg{display:flex;border-radius:6px;overflow:hidden;border:1px solid var(--border);margin-bottom:10px}
.seg{flex:1;padding:7px;font-size:12px;text-align:center;cursor:pointer;background:transparent;
  border:none;color:var(--text2);transition:.15s}
.seg.buy{background:rgba(8,153,129,.18);color:var(--green)}
.seg.sell{background:rgba(242,54,69,.18);color:var(--red)}
.of-in{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:8px 10px;border-radius:6px;font-size:12px;margin-bottom:7px;outline:none}
.of-in:focus{border-color:var(--border-gold)}
.of-2{display:flex;gap:6px}
.of-2 .of-in{margin-bottom:0}
.sub-btn{width:100%;padding:9px;border-radius:6px;border:none;cursor:pointer;font-size:12px;
  font-weight:700;margin-top:9px;letter-spacing:.04em;transition:.15s}
.sub-buy{background:var(--green);color:#07110E}
.sub-sell{background:var(--red);color:#fff}
.sub-btn:hover{filter:brightness(1.1)}

/* ── POSITIONS MINI ── */
.pos-item{padding:8px 14px;border-bottom:1px solid var(--border);font-size:11px;display:flex;justify-content:space-between;align-items:center}
.pos-sym{font-weight:600;color:var(--gold);font-family:var(--mono)}
.pos-meta{font-size:10px;color:var(--text3)}

/* ── TOAST ── */
#toasts{position:fixed;top:18px;left:18px;display:flex;flex-direction:column;gap:8px;z-index:9999}
.toast{min-width:240px;max-width:340px;padding:11px 14px;border-radius:10px;background:var(--surface);
  border:1px solid var(--border);box-shadow:var(--shadow);animation:tIn .2s ease;font-size:12px}
.toast.success{border-right:4px solid var(--green)}.toast.warn{border-right:4px solid var(--amber)}
.toast.info{border-right:4px solid var(--blue)}.toast.error{border-right:4px solid var(--red)}
@keyframes tIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* ── STATUS BAR ── */
.sbar{background:var(--bg2);border-top:1px solid var(--border);padding:4px 18px;
  display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--text3);flex-shrink:0}

/* ── RESPONSIVE ── */
@media(max-width:1200px){.workspace{grid-template-columns:220px 1fr}.right-col{display:none}.kpi-row{grid-template-columns:repeat(2,1fr)}}
@media(max-width:820px){.workspace{grid-template-columns:1fr}.left-col{display:none}}
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.0/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useMemo,useCallback}=React;

/* ══════════════ CONSTANTS ══════════════ */
const SK={theme:'etd_theme',sym:'etd_sym',symT:'etd_symt',ival:'etd_ival',journal:'etd_journal',risk:'etd_risk',unlocked:'etd_unlocked'};

const SYMBOLS=[
  {sym:'AMEX:SPY',title:'S&P 500',sub:'أسهم أمريكية'},
  {sym:'TADAWUL:TASI',title:'تاسي',sub:'السوق السعودي'},
  {sym:'OANDA:XAUUSD',title:'ذهب',sub:'معادن ثمينة'},
  {sym:'OANDA:XAGUSD',title:'فضة',sub:'معادن ثمينة'},
  {sym:'NYMEX:CL1!',title:'نفط',sub:'طاقة'},
  {sym:'BINANCE:BTCUSD',title:'بيتكوين',sub:'أصول رقمية'},
];
const IVALS=[{v:'15',l:'15د'},{v:'60',l:'1س'},{v:'D',l:'يومي'},{v:'W',l:'أسبوعي'},{v:'M',l:'شهري'}];

const WATCHLIST=[
  {sym:'EUR/USD',name:'يورو / دولار',price:1.0842,chg:0.0018},
  {sym:'GBP/USD',name:'جنيه / دولار',price:1.2734,chg:-0.0043},
  {sym:'USD/JPY',name:'دولار / ين',price:151.62,chg:0.45},
  {sym:'XAU/USD',name:'ذهب / دولار',price:2318.40,chg:12.80},
  {sym:'BTC/USD',name:'بيتكوين / دولار',price:67420,chg:1840},
  {sym:'TADAWUL',name:'مؤشر تداول',price:11842,chg:78},
  {sym:'US30',name:'داو جونز',price:39284,chg:-142},
  {sym:'CRUDE',name:'نفط WTI',price:82.34,chg:0.68},
  {sym:'USD/SAR',name:'دولار / ريال',price:3.7502,chg:0.0001},
  {sym:'NASDAQ',name:'ناسداك 100',price:17842,chg:124},
];

const NEWS_DATA=[
  {time:'14:32',hl:'الفيدرالي يُلمّح إلى تثبيت الفائدة حتى Q3 2025',t:'bear'},
  {time:'13:18',hl:'ارتفاع مفاجئ في التضخم الأوروبي يدعم اليورو',t:'bull'},
  {time:'12:45',hl:'مؤشر تداول يُسجّل رابع جلسة صاعدة على التوالي',t:'bull'},
  {time:'11:30',hl:'أسعار النفط تتراجع بعد بيانات المخزونات الأمريكية',t:'bear'},
  {time:'10:15',hl:'البيتكوين يختبر مقاومة $68K مع تراجع التقلبات',t:'neu'},
  {time:'09:02',hl:'البنك المركزي السعودي يُبقي السياسة دون تغيير',t:'neu'},
  {time:'08:40',hl:'توقعات بانخفاض التضخم الأمريكي في تقرير الجمعة',t:'bull'},
];

const PNL_TODAY=[
  {sym:'XAU/USD',note:'مفتوحة',pnl:2840},
  {sym:'EUR/USD',note:'مفتوحة',pnl:2200},
  {sym:'CRUDE',note:'مفتوحة',pnl:2280},
  {sym:'BTC/USD',note:'مفتوحة',pnl:1610},
  {sym:'US30',note:'مفتوحة',pnl:1840},
  {sym:'GBP/USD',note:'معلقة',pnl:0},
];

const DEF_RISK={capital:'',riskPct:'1',entryPx:'',stopPx:'',targetPx:'',direction:'long'};
const DEF_TRADE={date:new Date().toISOString().slice(0,10),symbol:'S&P 500',direction:'long',qty:'',entry:'',exit:'',notes:''};

/* ══════════════ HELPERS ══════════════ */
function gs(k,fb){try{const r=localStorage.getItem(k);return r===null?fb:JSON.parse(r)}catch{return fb}}
function ss(k,v){localStorage.setItem(k,JSON.stringify(v))}
function fmt(v,d=2){if(!isFinite(v))return '—';return new Intl.NumberFormat('ar-SA',{maximumFractionDigits:d}).format(v)}
function fmtPx(sym,p){
  if(p==null)return '—';
  if(['BTC/USD','TADAWUL','US30','NASDAQ'].some(s=>sym===s))return p.toLocaleString('en',{maximumFractionDigits:0});
  if(sym.includes('JPY'))return p.toFixed(2);
  if(sym.includes('XAU')||sym.includes('CRUDE'))return p.toFixed(2);
  if(sym.includes('SAR'))return p.toFixed(4);
  return p.toFixed(4);
}
function jitter(v,f=0.0003){return v*(1+(Math.random()-.5)*f*2)}
function pnlDir(dir,en,ex,q){return ((dir==='long'?1:-1)*(ex-en)*q)}
function monthlyStats(trades){
  const m=new Map();
  trades.forEach(t=>{const k=t.date?t.date.slice(0,7):'—';if(!m.has(k))m.set(k,{k,total:0,n:0,wins:0,losses:0});const c=m.get(k);c.total+=t.pnl;c.n++;if(t.pnl>0)c.wins++;if(t.pnl<0)c.losses++;});
  return Array.from(m.values()).sort((a,b)=>a.k.localeCompare(b.k));
}

/* ══════════════ COMPONENTS ══════════════ */
function Toast({toasts}){
  return <div id="toasts">{toasts.map(t=><div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}</div>;
}

function TVTicker({theme}){
  const ref=useRef();
  useEffect(()=>{
    if(!ref.current)return;
    ref.current.innerHTML='';
    const h=document.createElement('div');h.style.cssText='width:100%;height:100%';
    ref.current.appendChild(h);
    const s=document.createElement('script');
    s.src='https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js';
    s.async=true;
    s.innerHTML=JSON.stringify({
      symbols:[
        {proName:'TADAWUL:TASI',title:'TASI'},
        {proName:'AMEX:SPY',title:'S&P 500'},
        {proName:'OANDA:XAUUSD',title:'Gold'},
        {proName:'OANDA:XAGUSD',title:'Silver'},
        {proName:'NYMEX:CL1!',title:'Oil'},
        {proName:'BINANCE:BTCUSD',title:'Bitcoin'},
        {proName:'OANDA:EURUSD',title:'EUR/USD'},
      ],
      showSymbolLogo:true,colorTheme:theme,isTransparent:true,displayMode:'adaptive',locale:'ar_SA'
    });
    h.appendChild(s);
  },[theme]);
  return <div ref={ref} style={{width:'100%',height:'100%'}}/>;
}

function TVChart({theme,symbol,interval}){
  const ref=useRef();
  useEffect(()=>{
    if(!ref.current)return;
    ref.current.innerHTML='<div id="tv_adv" style="width:100%;height:100%"></div>';
    const s=document.createElement('script');
    s.src='https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
    s.async=true;
    s.innerHTML=JSON.stringify({
      autosize:true,symbol,interval,timezone:'Asia/Riyadh',theme,style:'1',locale:'ar_SA',
      allow_symbol_change:true,details:true,calendar:true,enable_publishing:false,
      support_host:'https://www.tradingview.com',container_id:'tv_adv'
    });
    ref.current.appendChild(s);
  },[theme,symbol,interval]);
  return <div id="tvChartHost" ref={ref}/>;
}

function TVCalendar({theme}){
  const ref=useRef();
  useEffect(()=>{
    if(!ref.current)return;
    ref.current.innerHTML='<div id="tv_cal" style="width:100%;height:320px"></div>';
    const s=document.createElement('script');
    s.src='https://s3.tradingview.com/external-embedding/embed-widget-events.js';
    s.async=true;
    s.innerHTML=JSON.stringify({width:'100%',height:'320',colorTheme:theme,isTransparent:true,locale:'ar_SA',importanceFilter:'-1,0,1'});
    ref.current.appendChild(s);
  },[theme]);
  return <div ref={ref} className="cal-wrap"/>;
}

function TVTimeline({theme}){
  const ref=useRef();
  useEffect(()=>{
    if(!ref.current)return;
    ref.current.innerHTML='<div id="tv_news" style="width:100%;height:280px"></div>';
    const s=document.createElement('script');
    s.src='https://s3.tradingview.com/external-embedding/embed-widget-timeline.js';
    s.async=true;
    s.innerHTML=JSON.stringify({feedMode:'all_symbols',colorTheme:theme,isTransparent:true,displayMode:'regular',width:'100%',height:'280',locale:'ar_SA'});
    ref.current.appendChild(s);
  },[theme]);
  return <div ref={ref}/>;
}

function PerformanceChart({trades,theme}){
  const cvs=useRef();const chart=useRef();
  useEffect(()=>{
    if(!cvs.current||typeof Chart==='undefined')return;
    const ms=monthlyStats(trades);
    if(chart.current)chart.current.destroy();
    if(!ms.length)return;
    const gc=theme==='dark'?'rgba(255,255,255,.06)':'rgba(17,24,39,.06)';
    const tc=theme==='dark'?'#8E98AA':'#6B7280';
    chart.current=new Chart(cvs.current,{
      type:'bar',
      data:{
        labels:ms.map(m=>m.k),
        datasets:[{label:'ر/خ شهرية',data:ms.map(m=>m.total),borderRadius:6,
          backgroundColor:ms.map(m=>m.total>=0?'rgba(8,153,129,.7)':'rgba(242,54,69,.7)')}]
      },
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{labels:{color:tc}}},
        scales:{x:{ticks:{color:tc},grid:{color:gc}},y:{ticks:{color:tc},grid:{color:gc}}}}
    });
    return ()=>chart.current&&chart.current.destroy();
  },[trades,theme]);
  if(!trades.length)return <div className="empty-state">أضف صفقات لعرض الرسم البياني الشهري</div>;
  return <div className="chart-canvas-wrap"><canvas ref={cvs}/></div>;
}

/* ══════════════ MAIN APP ══════════════ */
function App(){
  const [theme,setTheme]=useState(gs(SK.theme,'dark'));
  const [symbol,setSymbol]=useState(gs(SK.sym,'AMEX:SPY'));
  const [symbolT,setSymbolT]=useState(gs(SK.symT,'S&P 500'));
  const [interval,setInterval]=useState(gs(SK.ival,'D'));
  const [journal,setJournal]=useState(gs(SK.journal,[]));
  const [riskF,setRiskF]=useState(gs(SK.risk,DEF_RISK));
  const [tradeF,setTradeF]=useState({...DEF_TRADE});
  const [toasts,setToasts]=useState([]);
  const [tab,setTab]=useState('chart');
  const [orderSide,setOrderSide]=useState('buy');
  const [srch,setSrch]=useState('');
  const [dfilt,setDfilt]=useState('all');
  const [rfilt,setRfilt]=useState('all');
  const [mfilt,setMfilt]=useState('all');
  const [prices,setPrices]=useState(()=>Object.fromEntries(WATCHLIST.map(w=>[w.sym,w.price])));
  const [clock,setClock]=useState('');
  const [session,setSession]=useState('جلسة أوروبا');
  const [unlocked,setUnlocked]=useState(gs(SK.unlocked,false));
  const [ping,setPing]=useState(12);

  useEffect(()=>{document.body.classList.toggle('light',theme==='light');ss(SK.theme,theme)},[theme]);
  useEffect(()=>{ss(SK.sym,symbol);ss(SK.symT,symbolT)},[symbol,symbolT]);
  useEffect(()=>{ss(SK.ival,interval)},[interval]);
  useEffect(()=>{ss(SK.journal,journal)},[journal]);
  useEffect(()=>{ss(SK.risk,riskF)},[riskF]);

  useEffect(()=>{
    const id=setInterval(()=>{
      const now=new Date();
      const h=String(now.getHours()).padStart(2,'0');
      const m=String(now.getMinutes()).padStart(2,'0');
      const s=String(now.getSeconds()).padStart(2,'0');
      setClock(`${h}:${m}:${s}`);
      const hr=now.getUTCHours();
      setSession(hr<8?'جلسة آسيا':hr<16?'جلسة أوروبا':'جلسة أمريكا');
    },1000);
    return()=>clearInterval(id);
  },[]);

  useEffect(()=>{
    const id=setInterval(()=>{
      setPrices(prev=>{
        const next={...prev};
        WATCHLIST.forEach(w=>{
          const f=w.sym.includes('BTC')?0.0008:w.sym.includes('XAU')?0.0005:0.0003;
          next[w.sym]=Math.round(jitter(prev[w.sym],f)*100000)/100000;
        });
        return next;
      });
      setPing(12+Math.floor(Math.random()*8));
    },5000);
    return()=>clearInterval(id);
  },[]);

  function notify(msg,type='info',dur=2800){
    const id=`${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),dur);
  }

  const riskCalc=useMemo(()=>{
    const cap=parseFloat(riskF.capital),rp=parseFloat(riskF.riskPct),en=parseFloat(riskF.entryPx),st=parseFloat(riskF.stopPx),tg=parseFloat(riskF.targetPx);
    if([cap,rp,en,st].some(v=>!isFinite(v)||v<=0))return{ra:null,rpu:null,ps:null,rr:null,hint:'أدخل القيم الأساسية لحساب حجم الصفقة.'};
    const ra=cap*(rp/100),rpu=Math.abs(en-st);
    if(rpu===0)return{ra:null,rpu:null,ps:null,rr:null,hint:'سعر الدخول ووقف الخسارة لا يمكن أن يكونا متساويين.'};
    const ps=ra/rpu;
    let rr=null,hint='أضف هدفاً سعرياً لاحتساب نسبة العائد/المخاطرة.';
    if(isFinite(tg)&&tg>0){
      const rw=Math.abs(tg-en);rr=rw/rpu;
      hint=`الربح النظري عند الهدف ≈ $${fmt(rw*ps,2)}`;
    }
    return{ra,rpu,ps,rr,hint};
  },[riskF]);

  const stats=useMemo(()=>{
    const n=journal.length,wins=journal.filter(t=>t.pnl>0).length,total=journal.reduce((s,t)=>s+t.pnl,0);
    return{n,wins,total,avg:n?total/n:0,wr:n?(wins/n)*100:0};
  },[journal]);

  const months=useMemo(()=>monthlyStats(journal).map(m=>m.k).reverse(),[journal]);
  const topMonths=useMemo(()=>monthlyStats(journal).reverse().slice(0,3),[journal]);

  const filtered=useMemo(()=>[...journal].reverse().filter(t=>{
    const sm=!srch||[t.symbol,t.notes,t.date].join(' ').toLowerCase().includes(srch.toLowerCase());
    const dm=dfilt==='all'||t.direction===dfilt;
    const rm=rfilt==='all'||(rfilt==='win'&&t.pnl>0)||(rfilt==='loss'&&t.pnl<0)||(rfilt==='flat'&&t.pnl===0);
    const mm=mfilt==='all'||(t.date&&t.date.slice(0,7)===mfilt);
    return sm&&dm&&rm&&mm;
  }),[journal,srch,dfilt,rfilt,mfilt]);

  function addTrade(){
    const q=parseFloat(tradeF.qty),en=parseFloat(tradeF.entry),ex=parseFloat(tradeF.exit);
    if([q,en,ex].some(v=>!isFinite(v)||v<=0)){notify('تحقق من بيانات الصفقة','warn');return;}
    const t={id:`${Date.now().toString(36)}_${Math.random().toString(36).slice(2,7)}`,
      date:tradeF.date,symbol:tradeF.symbol.trim()||symbolT,direction:tradeF.direction,
      qty:q,entry:en,exit:ex,pnl:pnlDir(tradeF.direction,en,ex,q),notes:tradeF.notes.trim()};
    setJournal(p=>[...p,t]);
    setTradeF({...DEF_TRADE,date:new Date().toISOString().slice(0,10),symbol:symbolT});
    notify('تمت إضافة الصفقة','success');
  }

  function exportCsv(){
    if(!journal.length){notify('لا توجد بيانات للتصدير','warn');return;}
    const h=['date','symbol','direction','entry','exit','qty','pnl','notes'];
    const rows=journal.map(t=>[t.date,t.symbol,t.direction,t.entry,t.exit,t.qty,t.pnl,(t.notes||'').replace(/\n/g,' ')]);
    const csv=[h,...rows].map(r=>r.map(c=>`"${String(c??'').replace(/"/g,'""')}"`).join(',')).join('\n');
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
    a.download='trade-journal.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);
    notify('تم تصدير CSV','success');
  }

  function submitOrder(){
    const sym=document.getElementById('ofSym').value.trim().toUpperCase();
    if(!sym){notify('أدخل رمز الأداة','warn');return;}
    notify(`✅ أمر ${orderSide==='buy'?'الشراء':'البيع'} على ${sym} تم إرساله`,'success');
    document.getElementById('ofSym').value='';
  }

  if(!unlocked) return(
    <>
      <Toast toasts={toasts}/>
      <div className="auth-wrap">
        <div className="auth-card">
          <div className="auth-mark"><span>E</span></div>
          <div className="auth-badge">⚡ منصة تداول تنفيذية متقدمة</div>
          <h1 className="auth-title">Executive Trading Desk</h1>
          <p className="auth-sub">لوحة تداول احترافية لمتابعة الأسواق الحية، إدارة المخاطر، رادار القرار الذكي، وسجل الصفقات الكامل — كل شيء في مكان واحد.</p>
          <button className="btn-enter" onClick={()=>{setUnlocked(true);ss(SK.unlocked,true);notify('مرحباً بك في المنصة','success')}}>دخول إلى المنصة</button>
        </div>
      </div>
    </>
  );

  const histStats={'S&P 500':{p:72,pat:'ارتداد من المتوسط 50',rep:'18/25'},'تاسي':{p:65,pat:'فجوة سعرية صاعدة',rep:'13/20'},'ذهب':{p:78,pat:'كسر مقاومة يومية',rep:'11/14'}};
  const hs=histStats[symbolT]||{p:60,pat:'نمط فني متكرر',rep:'12/20'};

  return(
    <>
      <Toast toasts={toasts}/>
      <div className="shell">

        {/* TICKER */}
        <div className="ticker-bar">
          <TVTicker theme={theme}/>
        </div>

        {/* HEADER */}
        <div className="topbar">
          <div className="brand">
            <div className="brand-mark"><span>E</span></div>
            <div>
              <div className="brand-txt">EXECUTIVE TRADING DESK</div>
              <div className="brand-sub">متابعة الأسواق • إدارة المخاطر • سجل الصفقات</div>
            </div>
          </div>
          <div className="hbar-right">
            <div className="hbadge">حساب تجريبي</div>
            <div className="live-dot"/>
            <div className="hclock">{clock}</div>
            <div className="hbadge">{session}</div>
            <button className="theme-btn" onClick={()=>{const n=theme==='dark'?'light':'dark';setTheme(n);notify(`الوضع ${n==='dark'?'الداكن':'الفاتح'}`,'info')}}>
              {theme==='dark'?'🌙':'☀️'}
            </button>
          </div>
        </div>

        {/* WORKSPACE */}
        <div className="workspace">

          {/* ── LEFT COL ── */}
          <div className="left-col">
            <div className="ptitle">تبديل الأصل</div>
            <div className="sym-grid">
              {SYMBOLS.map(s=>(
                <button key={s.sym} className={`sym-btn${symbol===s.sym?' active':''}`}
                  onClick={()=>{setSymbol(s.sym);setSymbolT(s.title);setTradeF(p=>({...p,symbol:s.title}));notify(`الرسم البياني: ${s.title}`,'success')}}>
                  <b>{s.title}</b><small>{s.sub}</small>
                </button>
              ))}
            </div>
            <div className="ptitle">قائمة المراقبة</div>
            {WATCHLIST.map((w,i)=>{
              const p=prices[w.sym]??w.price;
              const pct=(w.chg/w.price*100).toFixed(2);
              const up=w.chg>=0;
              return(
                <div key={w.sym} className={`w-item${i===0?' sel':''}`} onClick={()=>notify(`${w.sym}: ${fmtPx(w.sym,p)}`,'info')}>
                  <div>
                    <div className="wi-sym" style={{color:up?'var(--green)':'var(--red)'}}>{w.sym}</div>
                    <div className="wi-name">{w.name}</div>
                  </div>
                  <div>
                    <div className="wi-px">{fmtPx(w.sym,p)}</div>
                    <div className={`wi-chg ${up?'up':'dn'}`}>{up?'+':''}{pct}%</div>
                  </div>
                </div>
              );
            })}
            <div className="ptitle" style={{marginTop:8}}>آخر الأخبار</div>
            {NEWS_DATA.map((n,i)=>(
              <div key={i} className="news-item">
                <div className="news-time">{n.time}</div>
                <div className="news-hl">{n.hl}</div>
                <span className={`ntag nt-${n.t}`}>{n.t==='bull'?'صاعد':n.t==='bear'?'هابط':'محايد'}</span>
              </div>
            ))}
          </div>

          {/* ── CENTER COL ── */}
          <div className="center-col">

            {/* KPIs */}
            <div className="kpi-row">
              <div className="kpi k-gold">
                <div className="kpi-lbl">إجمالي المحفظة</div>
                <div className="kpi-val gold">$248,500</div>
                <div className="kpi-sub up">▲ +3.2% اليوم</div>
              </div>
              <div className="kpi k-green">
                <div className="kpi-lbl">الأرباح والخسائر اليوم</div>
                <div className="kpi-val green">+$7,740</div>
                <div className="kpi-sub" style={{color:'var(--text3)'}}>14 صفقة مفتوحة</div>
              </div>
              <div className="kpi k-red">
                <div className="kpi-lbl">إجمالي التعرض</div>
                <div className="kpi-val">$186,200</div>
                <div className="kpi-sub dn">▼ رافعة 3.2×</div>
              </div>
              <div className="kpi k-blue">
                <div className="kpi-lbl">الهامش المتاح</div>
                <div className="kpi-val">$62,300</div>
                <div className="kpi-sub" style={{color:'var(--text3)'}}>مستوى الهامش 225%</div>
              </div>
            </div>

            {/* CHART + TABS PANEL */}
            <div className="panel" style={{flex:'none'}}>
              <div className="tab-bar">
                {[['chart','📈 الرسم البياني المتقدم'],['journal','📒 سجل الصفقات'],['risk','⚖️ إدارة المخاطر'],['perf','📊 الأداء الشهري'],['tvnews','🌍 أخبار الأسواق']].map(([k,l])=>(
                  <button key={k} className={`tab${tab===k?' on':''}`} onClick={()=>setTab(k)}>{l}</button>
                ))}
              </div>

              {/* CHART PANE */}
              <div className={`tab-pane${tab==='chart'?' on':''}`} style={{minHeight:520}}>
                <div style={{padding:'8px 12px',borderBottom:'1px solid var(--border)',background:'var(--bg2)',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
                  <span style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>الأصل الحالي: <span style={{color:'var(--gold)'}}>{symbolT}</span></span>
                  <div className="ival-row">
                    {IVALS.map(iv=>(
                      <button key={iv.v} className={`ivbtn${interval===iv.v?' on':''}`} onClick={()=>{setInterval(iv.v);notify(`الإطار الزمني: ${iv.l}`,'info')}}>{iv.l}</button>
                    ))}
                  </div>
                </div>
                <TVChart theme={theme} symbol={symbol} interval={interval}/>
              </div>

              {/* JOURNAL PANE */}
              <div className={`tab-pane${tab==='journal'?' on':''}`}>
                <div className="pb">
                  <div className="stats-row">
                    <div className="stat"><div className="stat-lbl">إجمالي الصفقات</div><div className="stat-val" style={{color:'var(--blue)'}}>{fmt(stats.n,0)}</div></div>
                    <div className="stat"><div className="stat-lbl">نسبة النجاح</div><div className="stat-val" style={{color:'var(--blue)'}}>{fmt(stats.wr,1)}%</div></div>
                    <div className="stat"><div className="stat-lbl">إجمالي الربح/الخسارة</div><div className={`stat-val ${stats.total>=0?'pos':'neg'}`}>${fmt(stats.total,2)}</div></div>
                    <div className="stat"><div className="stat-lbl">متوسط الصفقة</div><div className={`stat-val ${stats.avg>=0?'pos':'neg'}`}>${fmt(stats.avg,2)}</div></div>
                  </div>
                  <div className="jform">
                    <div className="fld"><label>التاريخ</label><input type="date" value={tradeF.date} onChange={e=>setTradeF(p=>({...p,date:e.target.value}))}/></div>
                    <div className="fld"><label>الأصل</label><input type="text" value={tradeF.symbol} onChange={e=>setTradeF(p=>({...p,symbol:e.target.value}))} placeholder="مثال: SPY"/></div>
                    <div className="fld"><label>نوع الصفقة</label><select value={tradeF.direction} onChange={e=>setTradeF(p=>({...p,direction:e.target.value}))}><option value="long">شراء (Long)</option><option value="short">بيع (Short)</option></select></div>
                    <div className="fld"><label>الكمية</label><input type="number" min="0" step="0.01" value={tradeF.qty} onChange={e=>setTradeF(p=>({...p,qty:e.target.value}))} placeholder="مثال: 10"/></div>
                    <div className="fld"><label>سعر الدخول</label><input type="number" min="0" step="0.0001" value={tradeF.entry} onChange={e=>setTradeF(p=>({...p,entry:e.target.value}))} placeholder="مثال: 520.5"/></div>
                    <div className="fld"><label>سعر الخروج</label><input type="number" min="0" step="0.0001" value={tradeF.exit} onChange={e=>setTradeF(p=>({...p,exit:e.target.value}))} placeholder="مثال: 528"/></div>
                    <div className="fld full"><label>ملاحظات</label><textarea value={tradeF.notes} onChange={e=>setTradeF(p=>({...p,notes:e.target.value}))} placeholder="سبب الدخول، الدرس المستفاد..."/></div>
                  </div>
                  <div className="jactions">
                    <button className="btn btn-prime" onClick={addTrade}>إضافة الصفقة</button>
                    <button className="btn btn-ghost" onClick={()=>{setTradeF(p=>({...p,symbol:symbolT}));notify('تم نسخ الأصل الحالي','info')}}>نسخ الأصل الحالي</button>
                    <button className="btn btn-ghost" onClick={exportCsv}>تصدير CSV</button>
                    <button className="btn btn-danger" onClick={()=>{setJournal([]);notify('تم مسح السجل','warn')}}>مسح السجل</button>
                  </div>
                  <div className="filter-row">
                    <input placeholder="بحث في الأصل أو الملاحظات..." value={srch} onChange={e=>setSrch(e.target.value)}/>
                    <select value={dfilt} onChange={e=>setDfilt(e.target.value)}><option value="all">كل الاتجاهات</option><option value="long">شراء</option><option value="short">بيع</option></select>
                    <select value={rfilt} onChange={e=>setRfilt(e.target.value)}><option value="all">كل النتائج</option><option value="win">رابحة</option><option value="loss">خاسرة</option><option value="flat">متعادلة</option></select>
                    <select value={mfilt} onChange={e=>setMfilt(e.target.value)}><option value="all">كل الأشهر</option>{months.map(m=><option key={m} value={m}>{m}</option>)}</select>
                    <button className="btn btn-ghost" onClick={()=>{setSrch('');setDfilt('all');setRfilt('all');setMfilt('all')}}>إعادة تعيين</button>
                  </div>
                  <div className="tbl-wrap">
                    <table className="tbl">
                      <thead><tr><th>التاريخ</th><th>الأصل</th><th>الاتجاه</th><th>الدخول</th><th>الخروج</th><th>الكمية</th><th>الربح/الخسارة</th><th>ملاحظات</th><th>حذف</th></tr></thead>
                      <tbody>
                        {filtered.length===0?<tr><td colSpan="9" className="empty-state">لا توجد نتائج</td></tr>:filtered.map(t=>(
                          <tr key={t.id}>
                            <td>{t.date||'—'}</td>
                            <td className="sym-cell">{t.symbol}</td>
                            <td><span className={`tag ${t.direction}`}>{t.direction==='long'?'شراء':'بيع'}</span></td>
                            <td className="num">{fmt(t.entry,4)}</td><td className="num">{fmt(t.exit,4)}</td><td className="num">{fmt(t.qty,2)}</td>
                            <td className={`num ${t.pnl>=0?'pos':'neg'}`}>${fmt(t.pnl,2)}</td>
                            <td title={t.notes}>{t.notes?t.notes.slice(0,28)+(t.notes.length>28?'…':''):'—'}</td>
                            <td><button className="del-btn" onClick={()=>{setJournal(p=>p.filter(x=>x.id!==t.id));notify('تم حذف الصفقة','info')}}>حذف</button></td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>

              {/* RISK PANE */}
              <div className={`tab-pane${tab==='risk'?' on':''}`}>
                <div className="pb">
                  <div className="pct-btns">
                    {[0.5,1,1.5,2].map(v=><button key={v} className="pct-btn" onClick={()=>setRiskF(p=>({...p,riskPct:String(v)}))}>{v}%</button>)}
                    <button className="pct-btn" onClick={()=>setRiskF(DEF_RISK)}>مسح</button>
                  </div>
                  <div className="risk-grid">
                    <div className="fld"><label>حجم المحفظة ($)</label><input type="number" min="0" step="0.01" value={riskF.capital} onChange={e=>setRiskF(p=>({...p,capital:e.target.value}))} placeholder="10000"/></div>
                    <div className="fld"><label>نسبة المخاطرة (%)</label><input type="number" min="0" step="0.1" value={riskF.riskPct} onChange={e=>setRiskF(p=>({...p,riskPct:e.target.value}))} placeholder="1"/></div>
                    <div className="fld"><label>سعر الدخول</label><input type="number" min="0" step="0.0001" value={riskF.entryPx} onChange={e=>setRiskF(p=>({...p,entryPx:e.target.value}))} placeholder="520.5"/></div>
                    <div className="fld"><label>وقف الخسارة</label><input type="number" min="0" step="0.0001" value={riskF.stopPx} onChange={e=>setRiskF(p=>({...p,stopPx:e.target.value}))} placeholder="515"/></div>
                    <div className="fld"><label>الهدف السعري (اختياري)</label><input type="number" min="0" step="0.0001" value={riskF.targetPx} onChange={e=>setRiskF(p=>({...p,targetPx:e.target.value}))} placeholder="532"/></div>
                    <div className="fld"><label>نوع الصفقة</label><select value={riskF.direction} onChange={e=>setRiskF(p=>({...p,direction:e.target.value}))}><option value="long">شراء (Long)</option><option value="short">بيع (Short)</option></select></div>
                  </div>
                  <button className="btn btn-prime" style={{width:'100%',marginBottom:12}} onClick={()=>{if(!riskCalc.ra){notify('تحقق من المدخلات','warn');return;}notify('تم احتساب الصفقة','success')}}>حساب الصفقة</button>
                  <div className="risk-summary">
                    <div className="metric"><div className="metric-lbl">المبلغ المعرض للخطر</div><div className="metric-val gold">{riskCalc.ra!==null?`$${fmt(riskCalc.ra,2)}`:'—'}</div></div>
                    <div className="metric"><div className="metric-lbl">المخاطرة لكل وحدة</div><div className="metric-val red">{riskCalc.rpu!==null?`$${fmt(riskCalc.rpu,4)}`:'—'}</div></div>
                    <div className="metric"><div className="metric-lbl">الكمية المسموحة</div><div className="metric-val green">{riskCalc.ps!==null?`${fmt(riskCalc.ps,2)} وحدة`:'—'}</div></div>
                    <div className="metric"><div className="metric-lbl">العائد / المخاطرة</div><div className="metric-val gold">{riskCalc.rr!==null?`${fmt(riskCalc.rr,2)} R`:'—'}</div></div>
                  </div>
                  <div className="hint">{riskCalc.hint}</div>
                </div>
              </div>

              {/* PERFORMANCE PANE */}
              <div className={`tab-pane${tab==='perf'?' on':''}`}>
                <div className="pb">
                  <PerformanceChart trades={journal} theme={theme}/>
                  <div className="monthly-grid">
                    {topMonths.length===0?<div className="empty-state" style={{gridColumn:'1/-1'}}>أضف صفقات لعرض الإحصائيات الشهرية</div>:topMonths.map(m=>(
                      <div key={m.k} className="mo-card">
                        <h4>{m.k}</h4>
                        <p>الصفقات: <strong>{m.n}</strong><br/>رابحة: <strong style={{color:'var(--green)'}}>{m.wins}</strong><br/>خاسرة: <strong style={{color:'var(--red)'}}>{m.losses}</strong><br/>الصافي: <strong className={m.total>=0?'pos':'neg'}>${fmt(m.total,2)}</strong></p>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              {/* TV NEWS PANE */}
              <div className={`tab-pane${tab==='tvnews'?' on':''}`}>
                <div className="pb"><TVTimeline theme={theme}/></div>
              </div>
            </div>

          </div>{/* end center */}

          {/* ── RIGHT COL ── */}
          <div className="right-col">

            {/* MARKET PULSE */}
            <div className="ptitle">📡 رادار القرار الذكي</div>
            <div style={{padding:'10px 12px'}}>
              <div className="pulse-gauge">
                <div className="gauge-num" style={{color:'var(--amber)'}}>68</div>
                <div className="gauge-lbl">مؤشر الخوف والطمع</div>
              </div>
              <div className="pulse-2">
                <div className="pc"><div className="pc-lbl">الاحتمالية التاريخية</div><div className="pc-val" style={{color:'var(--green)'}}>75%</div></div>
                <div className="pc"><div className="pc-lbl">المزاج العام</div><div className="pc-val">تفاؤل</div></div>
              </div>
              <div style={{fontSize:11,color:'var(--text2)',marginBottom:4}}>الأكثر مراقبة</div>
              <div className="chip-group">
                {['الذهب','أرامكو','تاسي'].map(c=><span key={c} className="chip">{c}</span>)}
              </div>
              <div className="pulse-note"><strong>توجيه AI</strong>يظهر المتداولون تفاؤلاً ملحوظاً مع زيادة في أحجام السيولة لقطاع البنوك، مما يدعم احتمالات الصعود.</div>
            </div>

            {/* HISTORICAL ANALYSIS */}
            <div className="ptitle">⏳ الاحتمالات التاريخية</div>
            <div style={{padding:'10px 12px'}}>
              <div className="hist-stat">
                <div className="hist-pct">{hs.p}%</div>
                <div className="hist-lbl">نسبة نجاح النمط لـ {symbolT}</div>
              </div>
              <div className="detail-list">
                <div className="dl-row"><span className="dl-k">النمط المكتشف</span><span className="dl-v">{hs.pat}</span></div>
                <div className="dl-row"><span className="dl-k">تكرار النجاح</span><span className="dl-v">{hs.rep} مرة</span></div>
              </div>
              <div className="pulse-note" style={{marginTop:8}}>بناءً على آخر 10 سنوات، هذا النمط أعطى نتائج إيجابية في معظم الحالات المشابهة.</div>
            </div>

            {/* RISK METERS */}
            <div className="ptitle">إدارة المخاطر</div>
            <div className="rmeter">
              {[['مؤشر المخاطر الكلي','متوسط',58,'linear-gradient(90deg,var(--green),var(--amber))'],
                ['الرافعة المالية','3.2×',42,'var(--blue)'],
                ['استخدام الهامش','44%',44,'var(--green)'],
                ['التعرض لمخاطر العملة','62%',62,'var(--amber)'],
                ['الحد اليومي للخسارة','31%',31,'var(--red)']].map(([l,v,w,bg])=>(
                <div key={l}>
                  <div className="r-lbl"><span>{l}</span><span style={{fontFamily:'var(--mono)',fontSize:10}}>{v}</span></div>
                  <div className="r-bar"><div className="r-fill" style={{width:`${w}%`,background:bg}}/></div>
                </div>
              ))}
            </div>

            {/* PNL TODAY */}
            <div className="ptitle">أداء اليوم</div>
            {PNL_TODAY.map(p=>(
              <div key={p.sym} className="pnl-row">
                <div><div className="pnl-sym">{p.sym}</div><div className="pnl-note">{p.note}</div></div>
                <div className={`pnl-val ${p.pnl>0?'pos':p.pnl<0?'neg':''}`}>
                  {p.pnl===0?'—':(p.pnl>0?'+':'')+'$'+p.pnl.toLocaleString()}
                </div>
              </div>
            ))}

            {/* ECONOMIC CALENDAR */}
            <div className="ptitle">🗓️ الأجندة الاقتصادية</div>
            <div style={{padding:'0 0 8px'}}>
              <TVCalendar theme={theme}/>
            </div>

            {/* ORDER FORM */}
            <div className="order-form">
              <div className="of-ttl">إدخال أمر سريع</div>
              <div className="of-seg">
                <button className={`seg${orderSide==='buy'?' buy':''}`} onClick={()=>setOrderSide('buy')}>شراء</button>
                <button className={`seg${orderSide==='sell'?' sell':''}`} onClick={()=>setOrderSide('sell')}>بيع</button>
              </div>
              <input className="of-in" id="ofSym" placeholder="الرمز (مثل: EUR/USD)"/>
              <div className="of-2" style={{marginBottom:7}}>
                <input className="of-in" placeholder="الحجم" type="number"/>
                <input className="of-in" placeholder="السعر" type="number"/>
              </div>
              <div className="of-2">
                <input className="of-in" placeholder="وقف الخسارة" type="number"/>
                <input className="of-in" placeholder="جني الأرباح" type="number"/>
              </div>
              <button className={`sub-btn ${orderSide==='buy'?'sub-buy':'sub-sell'}`} onClick={submitOrder}>
                {orderSide==='buy'?'تنفيذ أمر الشراء ▶':'تنفيذ أمر البيع ▶'}
              </button>
            </div>

          </div>{/* end right */}

        </div>{/* end workspace */}

        {/* STATUS BAR */}
        <div className="sbar">
          <div style={{display:'flex',gap:18}}>
            <span style={{display:'flex',alignItems:'center',gap:5}}><div className="live-dot"/>متصل — بث مباشر</span>
            <span>سبريد EUR/USD: <span style={{color:'var(--green)',fontFamily:'var(--mono)'}}>0.2</span></span>
            <span>البنك المركزي: خامل</span>
          </div>
          <div style={{display:'flex',gap:18}}>
            <span>Executive Trading Desk v2.0</span>
            <span style={{fontFamily:'var(--mono)',color:'var(--green)'}}>⬤ {ping}ms</span>
          </div>
        </div>

      </div>
    </>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
